# Redis Configuration File
# Basic persistence settings for development

# RDB Persistence (Snapshot)
save 900 1
save 300 10
save 60 10000

# Optional: disable RDB if using AOF only
# save ""

# AOF Persistence (Append Only File)
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec

# Memory management
maxmemory 256mb
maxmemory-policy allkeys-lru

# Logging
loglevel notice

# Database selection
databases 16

# Slow log for monitoring
slowlog-log-slower-than 10000
slowlog-max-len 128

# Client handling
timeout 0
tcp-keepalive 300

# Enable keyspace notifications (useful for debugging)
notify-keyspace-events "Ex"
